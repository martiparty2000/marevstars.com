{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <h2 style="color: white; margin-top: 0; border-bottom: 1px solid #2a2e39; padding-bottom: 10px; text-align: center;">Club Registration</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>I am registering as a:</label>
            <select name="role" id="roleSelect" onchange="toggleFields()">
                <option value="child">Player / Child</option>
                <option value="parent">Parent</option>
                <option value="coach">Coach / Technical Staff</option>
            </select>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>EGN / ID Number</label>
            <input type="text" name="egn" required placeholder="0000000000">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="example@club.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <div style="position:relative;">
                <input id="registerPassword" type="password" name="password" required style="padding-right:34px;">
                <button type="button" aria-label="Show password" onclick="togglePassword('registerPassword', this)" 
                    style="position:absolute; right:6px; top:50%; transform:translateY(-50%); background:transparent; border:none; font-size:18px; cursor:pointer;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </div>
        <div class="form-group" id="dobGroup">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" required>
        </div>

        <div id="parentFields" style="display: none; background: #12141a; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 3px solid var(--gold);">
            <h4 style="margin: 0 0 10px 0; color: var(--gold);">Child Security Verification</h4>
            <div class="form-group">
                <label>Child Full Name</label>
                <input type="text" name="child_full_name">
            </div>
            <div class="form-group">
                <label>Child EGN</label>
                <input type="text" name="child_egn">
            </div>
            <div class="form-group">
                <label>Child Password Account Verification</label>
                <div style="position:relative;">
                    <input id="childPassword" type="password" name="child_password" style="padding-right:34px;">
                    <button type="button" aria-label="Show child password" onclick="togglePassword('childPassword', this)"
                        style="position:absolute; right:6px; top:50%; transform:translateY(-50%); background:transparent; border:none; font-size:18px; cursor:pointer;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">Submit Membership Request</button>
    </form>
</div>

<script>
function toggleFields() {
    var role = document.getElementById('roleSelect').value;
    var dobGroup = document.getElementById('dobGroup');
    var parentFields = document.getElementById('parentFields');
    
    if (role === 'parent') {
        parentFields.style.display = 'block';
        dobGroup.style.display = 'none';
    } else {
        parentFields.style.display = 'none';
        dobGroup.style.display = 'block';
    }
}
</script>
<script>
const _eyeSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const _eyeSlashSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a19.56 19.56 0 0 1 4.6-4.9"/><path d="M9.88 9.88A3 3 0 0 0 14.12 14.12"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

function togglePassword(id, btn){
    const el = document.getElementById(id);
    if(!el) return;
    if(el.type === 'password'){
        el.type = 'text';
        btn.innerHTML = _eyeSlashSvg;
        btn.setAttribute('aria-label', 'Hide password');
    } else {
        el.type = 'password';
        btn.innerHTML = _eyeSvg;
        btn.setAttribute('aria-label', 'Show password');
    }
}
</script>
{% endblock %}
