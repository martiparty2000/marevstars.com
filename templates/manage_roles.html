{% extends 'base.html' %}
{% block content %}
<div style="max-width:900px;margin:30px auto;background:var(--card-bg);padding:20px;border-radius:10px;border-top:4px solid var(--gold);">
    <h2 style="color:var(--gold);margin-top:0;">Assign Roles</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
        {% for user in users %}
        <div style="display:flex;align-items:center;justify-content:space-between;background:#0f1115;padding:12px;border-radius:8px;border-left:4px solid rgba(255,255,255,0.03);">
            <div>
                <strong style="color:#fff">{{ user.full_name }}</strong>
                <div style="color:#888;font-size:13px">{{ user.email }} • EGN: {{ user.egn }}</div>
            </div>
            <div>
                <form method="POST" style="display:flex;gap:8px;align-items:center;">
                    {% csrf_token %}
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    <select name="role" style="background:#0b0c0f;color:#fff;border:1px solid #222;padding:6px;border-radius:6px;">
                        <option value="player" {% if user.role == 'player' %}selected{% endif %}>Player</option>
                        <option value="coach" {% if user.role == 'coach' %}selected{% endif %}>Coach</option>
                        <option value="head_coach" {% if user.role == 'head_coach' %}selected{% endif %}>Head Coach</option>
                    </select>
                    <button type="submit" style="background:var(--gold);color:#0b0c0f;border:none;padding:8px 12px;border-radius:6px;font-weight:600;">Update</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
