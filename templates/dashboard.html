{% extends 'base.html' %}
{% block content %}
<div style="max-width: 900px; margin: 40px auto; color: white;">
    <h1 style="color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px;">Staff Portal</h1>
    
    <!-- Action Cards -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        
        <!-- Pending Approvals Card -->
        <div style="background: #1a1d24; padding: 25px; border-radius: 12px; border: 1px solid #333;">
            <h3 style="margin-top: 0;">Pending Approvals</h3>
            <p style="font-size: 1.1em; color: #ccc;">Users waiting: <strong style="color: var(--gold);">{{ pending_count }}</strong></p>
            <a href="{% url 'team:approval_dashboard' %}" 
               style="display: inline-block; background: #D4AF37; color: #05070a; padding: 10px 20px; border-radius: 6px; font-weight: bold; text-decoration: none;">
               🚀 Review Now
            </a>
        </div>

        <!-- Role Management Card -->
        <div style="background: #1a1d24; padding: 25px; border-radius: 12px; border: 1px solid #333;">
            <h3 style="margin-top: 0;">User Roles</h3>
            <p style="font-size: 1.1em; color: #ccc;">Manage coaches and staff access.</p>
            <a href="{% url 'team:manage_roles' %}" 
               style="display: inline-block; background: #003b7e; color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; text-decoration: none;">
               ⚙️ Edit Roles
            </a>
        </div>
    </div>
</div>
{% endblock %}
