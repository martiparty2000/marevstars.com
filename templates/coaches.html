{% extends 'base.html' %}
{% load static %}  {% block content %}
<h2 style="color: var(--gold); text-align: center; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px;">
    Нашият треньорски състав
</h2>

<div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;">
    {% for coach in coaches %}
    <div class="coach-card" style="background: var(--card-bg); padding: 25px; border-radius: 12px; max-width: 400px; border-top: 4px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.3s ease;">
        
        <img src="{% static 'images/'|add:coach.image %}" 
             alt="{{ coach.name }}" 
             style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;">
        
        <h3 style="color: var(--gold); margin: 0 0 10px 0;">{{ coach.name }}</h3>
        <p style="font-weight: bold; color: #fff; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
            {{ coach.role }}
        </p>
        <p style="line-height: 1.6; color: #ccc; font-size: 14px; text-align: justify;">
            {{ coach.bio }}
        </p>
    </div>
    {% empty %}
    <p style="color: #666;">Все още няма добавени треньори в базата данни.</p>
    {% endfor %}
</div>
{% endblock %}
